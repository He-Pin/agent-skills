name: agent_skills
description: A cross-platform desktop app for managing AI agent skills across 13 agents.
publish_to: 'none'
version: 0.1.4+1

environment:
  sdk: ^3.8.0
  flutter: ^3.32.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # State management
  provider: ^6.1.5
  # HTTP client
  http: ^1.4.0
  # SQLite for marketplace caching
  sqflite_common_ffi: ^2.3.4+5
  sqflite: ^2.4.2
  # File system & paths
  path_provider: ^2.1.5
  path: ^1.9.1
  # Markdown rendering
  flutter_markdown: ^0.7.7+1
  # TOML parsing
  toml: ^0.16.0
  # URL launcher
  url_launcher: ^6.3.1
  # File picker for local directory import
  file_picker: ^8.3.7
  # Process execution (for which command, git clone etc.)
  process_run: ^1.2.1
  # File system watcher
  watcher: ^1.1.1
  # Shared preferences for local storage
  shared_preferences: ^2.5.3
  # Window management for desktop
  window_manager: ^0.4.3
  # Intl for date formatting
  intl: ^0.20.2
  # Collection utilities
  collection: ^1.19.1
  # System tray support for desktop platforms
  system_tray: ^2.0.3
  # Native desktop notifications
  local_notifier: ^0.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/agents/
