# Releases are handled by the Build & Release workflow in build.yml.
# That workflow triggers on tag pushes (v*), builds all platforms,
# and creates a GitHub Release with artifacts automatically.
name: Release (see build.yml)

on:
  workflow_dispatch:

permissions: {}

jobs:
  redirect:
    runs-on: ubuntu-latest
    steps:
      - name: Release info
        run: echo "Releases are handled by build.yml. Push a v* tag to trigger a release."
