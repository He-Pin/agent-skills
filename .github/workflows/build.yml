# Multi-platform Flutter build workflow for AgentSkills
# Builds release binaries for macOS (Universal: x64 + ARM64), Windows (x64),
# and Linux (x64). Supports both x86 and ARM architectures.
#
# Triggered on:
# - Push to main branch
# - Pull requests to main
# - Manual dispatch (workflow_dispatch)
# - Tag pushes matching v* or plain semver (e.g. 0.0.2) pattern (creates GitHub Release with artifacts)
# - GitHub Release publication (handles releases created via the GitHub web UI or API,
#   which fire a 'release' event rather than a 'push.tags' event — this is the main
#   trigger path for releases created through the GitHub Releases page)
name: Build & Release

on:
  push:
    branches: [main]
    # Trigger on both v-prefixed (v1.0.0) and plain semver (0.0.2) tags.
    # '[0-9]*.[0-9]*' requires at least "digit.digit" to avoid matching
    # non-semver tags like "1abc".
    tags: ['v*', '[0-9]*.[0-9]*']
  pull_request:
    branches: [main]
  # Tags created via the GitHub web UI or Releases API fire a 'release' event,
  # NOT a 'push' event. Without this trigger, binary artifacts would never be
  # built when a release is created through the GitHub interface.
  release:
    types: [published]
  workflow_dispatch:

# Default to read-only; the release job overrides with write access
permissions:
  contents: read

# Use the tag name as the concurrency key for release events, since on.release
# sets github.ref to refs/heads/main (the default branch), which would otherwise
# collide with concurrent push-to-main runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.32.2'

jobs:
  # ──────────────────────────────────────────────
  # Linux x64 Build
  # ──────────────────────────────────────────────
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake ninja-build libgtk-3-dev pkg-config libnotify-dev libayatana-appindicator3-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test || true

      - name: Build Linux release
        run: flutter build linux --release

      - name: Package Linux build
        run: |
          cd build/linux/x64/release/bundle
          tar czf ../../../../../agent_skills-linux-x64.tar.gz .

      - name: Upload Linux x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent_skills-linux-x64
          path: agent_skills-linux-x64.tar.gz

  # ──────────────────────────────────────────────
  # macOS Build (Universal binary: x64 + ARM64)
  # ──────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      - name: Package macOS app
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../agent_skills-macos-universal.zip *.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent_skills-macos-universal
          path: agent_skills-macos-universal.zip

  # ──────────────────────────────────────────────
  # Windows x64 Build
  # ──────────────────────────────────────────────
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package Windows build
        run: |
          cd build\windows\x64\runner\Release
          Compress-Archive -Path * -DestinationPath ..\..\..\..\..\agent_skills-windows-x64.zip
        shell: pwsh

      - name: Upload Windows x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent_skills-windows-x64
          path: agent_skills-windows-x64.zip

  # ──────────────────────────────────────────────
  # Create/Update GitHub Release (on tag push or release publication)
  # ──────────────────────────────────────────────
  # Runs whenever this workflow is triggered by:
  #   1. A tag push (push.tags)  → ref_type == 'tag'
  #   2. A GitHub Release event (on.release.types: [published])
  #      This is the path taken when a user creates a release via the GitHub
  #      web UI or API. In that case github.ref_type == 'branch' (pointing at
  #      the default branch), so we must also check event_name == 'release'.
  #
  # When the release already exists (event_name == 'release'), we upload assets
  # to it without overwriting the user-written release notes.
  release:
    if: github.ref_type == 'tag' || github.event_name == 'release'
    needs:
      - build-linux-x64
      - build-macos
      - build-windows-x64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Determine the release tag name.
      # - For 'push.tags':  github.ref_name is the tag (e.g. "0.0.3").
      # - For 'release' event: github.ref_name is the default branch ("main"),
      #   so we use github.event.release.tag_name instead.
      - name: Resolve release tag name
        id: release_meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag_name=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            # Release already exists — do NOT regenerate notes (would overwrite user's text)
            echo "generate_notes=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "generate_notes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          draft: false
          # Auto-generate notes only when creating a brand-new release via tag push.
          # When triggered by a 'release' event, the release already exists and the
          # user may have written their own notes — preserve them.
          generate_release_notes: ${{ steps.release_meta.outputs.generate_notes }}
          files: |
            artifacts/agent_skills-linux-x64/agent_skills-linux-x64.tar.gz
            artifacts/agent_skills-macos-universal/agent_skills-macos-universal.zip
            artifacts/agent_skills-windows-x64/agent_skills-windows-x64.zip
